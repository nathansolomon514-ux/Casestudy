<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Top bar */
.nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #222;
    color: white;
    padding: 10px 15px;
}

.header_logo {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* Hamburger button */
.menu-toggle {
    font-size: 26px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* Sidebar */
.sidebar {
    position: fixed;
    top: 0;
    left: -260px; /* hidden */
    width: 260px;
    height: 100%;
    background: #111;
    padding-top: 60px;
    transition: 0.3s ease;
}

/* Show sidebar */
.sidebar.open {
    left: 0;
}

/* Sidebar links */
.sidebar a {
    display: block;
    padding: 15px 20px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #333;
}

/* Overlay (click outside to close) */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
}

.overlay.show {
    display: block;
}
</style>
</head>

<body>

<header class="nav-bar">
    <a href="#" class="header_logo">KRNK Athletics</a>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
}
</script>

</body>
</html>
